name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  windows-release:
    name: Build Windows & publier la release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --workspace

      - name: Empaqueter
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\viewerkiller.exe dist\
          Copy-Item target\release\viewerkiller-gui.exe dist\
          Copy-Item ETAT-DU-PROJET.md dist\ -ErrorAction SilentlyContinue
          Copy-Item README.md dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath viewerkiller-windows-x64.zip -Force

      - name: Générer SHA256SUMS
        shell: pwsh
        run: |
          $files = @(
            'viewerkiller-windows-x64.zip',
            'target/release/viewerkiller.exe',
            'target/release/viewerkiller-gui.exe'
          )
          $lines = foreach ($f in $files) {
            $h = (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower()
            # Format « <hash>  <nom> » compatible `sha256sum -c` (pour J16b).
            "$h  $(Split-Path -Leaf $f)"
          }
          $lines | Set-Content -Encoding ascii SHA256SUMS.txt
          Get-Content SHA256SUMS.txt

      - name: Publier la release
        uses: softprops/action-gh-release@v2
        with:
          name: ViewerKiller ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            viewerkiller-windows-x64.zip
            target/release/viewerkiller.exe
            target/release/viewerkiller-gui.exe
            SHA256SUMS.txt
